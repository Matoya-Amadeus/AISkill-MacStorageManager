<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 780" role="img" aria-labelledby="title desc">
  <title id="title">Mac Storage Manager README hero</title>
  <desc id="desc">A polished banner showing audit-first macOS cleanup, exact target review, and safe apply workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="48%" stop-color="#11243f"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.12" cy="0.15" r="0.45">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.88" cy="0.22" r="0.42">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0.7" cy="0.92" r="0.4">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1526" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#18314d" stop-opacity="0.74"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#020817" flood-opacity="0.45"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#06111f" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1440" height="780" rx="36" fill="url(#bg)"/>
  <rect width="1440" height="780" rx="36" fill="url(#glowA)"/>
  <rect width="1440" height="780" rx="36" fill="url(#glowB)"/>
  <rect width="1440" height="780" rx="36" fill="url(#glowC)"/>

  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <path d="M0 88H1440"/>
    <path d="M0 176H1440"/>
    <path d="M0 264H1440"/>
    <path d="M0 352H1440"/>
    <path d="M0 440H1440"/>
    <path d="M0 528H1440"/>
    <path d="M0 616H1440"/>
    <path d="M120 0V780"/>
    <path d="M280 0V780"/>
    <path d="M440 0V780"/>
    <path d="M600 0V780"/>
    <path d="M760 0V780"/>
    <path d="M920 0V780"/>
    <path d="M1080 0V780"/>
    <path d="M1240 0V780"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="64" y="68" width="630" height="644" rx="34" fill="url(#glass)" stroke="url(#panelStroke)"/>
  </g>

  <text x="112" y="158" fill="#93c5fd" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" letter-spacing="0.16em">
    MAC STORAGE MANAGER
  </text>
  <text x="112" y="250" fill="#f8fafc" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" letter-spacing="-0.03em">
    Audit first.
  </text>
  <text x="112" y="328" fill="#f8fafc" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" letter-spacing="-0.03em">
    Review exact targets.
  </text>
  <text x="112" y="406" fill="#f8fafc" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" letter-spacing="-0.03em">
    Clean safely.
  </text>

  <text x="112" y="480" fill="#cbd5e1" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500">
    A human-friendly macOS cleanup toolkit for caches, logs,
  </text>
  <text x="112" y="516" fill="#cbd5e1" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500">
    dev leftovers, and risky storage triage that should not be guessed.
  </text>

  <g font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700">
    <rect x="112" y="568" width="130" height="40" rx="20" fill="#e0f2fe" fill-opacity="0.12" stroke="#93c5fd" stroke-opacity="0.42"/>
    <text x="177" y="594" fill="#eff6ff" text-anchor="middle">macOS only</text>

    <rect x="254" y="568" width="126" height="40" rx="20" fill="#ecfeff" fill-opacity="0.12" stroke="#5eead4" stroke-opacity="0.42"/>
    <text x="317" y="594" fill="#eff6ff" text-anchor="middle">Audit first</text>

    <rect x="392" y="568" width="162" height="40" rx="20" fill="#ecfeff" fill-opacity="0.12" stroke="#67e8f9" stroke-opacity="0.42"/>
    <text x="473" y="594" fill="#eff6ff" text-anchor="middle">Exact target IDs</text>

    <rect x="112" y="624" width="168" height="40" rx="20" fill="#f0fdf4" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.42"/>
    <text x="196" y="650" fill="#eff6ff" text-anchor="middle">Redacted reports</text>

    <rect x="292" y="624" width="150" height="40" rx="20" fill="#f8fafc" fill-opacity="0.1" stroke="#e2e8f0" stroke-opacity="0.3"/>
    <text x="367" y="650" fill="#eff6ff" text-anchor="middle">Human README</text>

    <rect x="454" y="624" width="124" height="40" rx="20" fill="#f8fafc" fill-opacity="0.1" stroke="#e2e8f0" stroke-opacity="0.3"/>
    <text x="516" y="650" fill="#eff6ff" text-anchor="middle">Agent SKILL</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="98" width="606" height="584" rx="34" fill="url(#glass)" stroke="url(#panelStroke)"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="816" y="150" width="242" height="242" rx="30" fill="#09111f" fill-opacity="0.96" stroke="#93c5fd" stroke-opacity="0.2"/>
    <circle cx="937" cy="271" r="86" fill="none" stroke="#1e293b" stroke-width="24"/>
    <path d="M937 185 A86 86 0 1 1 875 332" fill="none" stroke="url(#accent)" stroke-width="24" stroke-linecap="round"/>
    <circle cx="937" cy="271" r="54" fill="#07111f" stroke="#ffffff" stroke-opacity="0.08"/>
    <path d="M906 299C925 286 944 270 968 242" fill="none" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
    <circle cx="992" cy="214" r="7" fill="#5eead4"/>
    <circle cx="878" cy="214" r="6" fill="#93c5fd" fill-opacity="0.9"/>
    <text x="937" y="278" fill="#f8fafc" text-anchor="middle" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800">Audit</text>
    <text x="937" y="308" fill="#cbd5e1" text-anchor="middle" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600">Find reclaimable bytes</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1090" y="146" width="236" height="126" rx="24" fill="#0a1527" fill-opacity="0.94" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="1122" y="188" fill="#f8fafc" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">Blocked until approved</text>
    <rect x="1122" y="206" width="74" height="28" rx="14" fill="#ef4444" fill-opacity="0.18" stroke="#f87171" stroke-opacity="0.42"/>
    <text x="1159" y="225" fill="#fecaca" text-anchor="middle" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">high risk</text>
    <text x="1122" y="255" fill="#cbd5e1" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Downloads · Trash · Docker · hidden-home</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1090" y="288" width="236" height="126" rx="24" fill="#0a1527" fill-opacity="0.94" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="1122" y="330" fill="#f8fafc" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800">Approved list</text>
    <rect x="1122" y="348" width="66" height="28" rx="14" fill="#22c55e" fill-opacity="0.18" stroke="#4ade80" stroke-opacity="0.42"/>
    <text x="1155" y="367" fill="#dcfce7" text-anchor="middle" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">in scope</text>
    <text x="1122" y="397" fill="#cbd5e1" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">home-caches · home-logs · pip-cache</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="838" y="438" width="464" height="180" rx="28" fill="#0a1527" fill-opacity="0.94" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="876" y="484" fill="#f8fafc" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800">Exact workflow, not guesswork</text>
    <path d="M878 528H1266" stroke="#ffffff" stroke-opacity="0.08"/>

    <g font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">
      <rect x="876" y="548" width="88" height="36" rx="18" fill="#dbeafe" fill-opacity="0.12" stroke="#93c5fd" stroke-opacity="0.4"/>
      <text x="920" y="572" fill="#eff6ff" text-anchor="middle">Audit</text>
      <path d="M968 566H1008" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
      <path d="M998 558L1012 566L998 574" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="1016" y="548" width="96" height="36" rx="18" fill="#ecfeff" fill-opacity="0.12" stroke="#67e8f9" stroke-opacity="0.4"/>
      <text x="1064" y="572" fill="#eff6ff" text-anchor="middle">List</text>
      <path d="M1118 566H1158" stroke="#67e8f9" stroke-width="2" stroke-linecap="round"/>
      <path d="M1148 558L1162 566L1148 574" fill="none" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="1170" y="548" width="112" height="36" rx="18" fill="#f0fdf4" fill-opacity="0.12" stroke="#4ade80" stroke-opacity="0.4"/>
      <text x="1226" y="572" fill="#eff6ff" text-anchor="middle">Approve</text>
    </g>

    <text x="876" y="610" fill="#cbd5e1" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500">Audit report → exact target IDs → approved scope → apply → re-audit delta</text>
  </g>
</svg>
