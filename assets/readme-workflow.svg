<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 460" role="img" aria-labelledby="title desc">
  <title id="title">Mac Storage Manager workflow</title>
  <desc id="desc">A workflow diagram showing audit, list, approve, clean, and verify with safety notes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="50%" stop-color="#10243d"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1526" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#17314d" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#020817" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1440" height="460" rx="28" fill="url(#bg)"/>

  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <path d="M0 92H1440"/>
    <path d="M0 184H1440"/>
    <path d="M0 276H1440"/>
    <path d="M0 368H1440"/>
    <path d="M144 0V460"/>
    <path d="M288 0V460"/>
    <path d="M432 0V460"/>
    <path d="M576 0V460"/>
    <path d="M720 0V460"/>
    <path d="M864 0V460"/>
    <path d="M1008 0V460"/>
    <path d="M1152 0V460"/>
    <path d="M1296 0V460"/>
  </g>

  <text x="72" y="66" fill="#e2e8f0" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="800">Audit → List → Approve → Clean → Verify</text>
  <text x="72" y="100" fill="#cbd5e1" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500">The repo is designed to make cleanup explainable before it becomes destructive.</text>

  <g filter="url(#shadow)">
    <rect x="66" y="144" width="220" height="164" rx="26" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.22"/>
    <rect x="334" y="144" width="220" height="164" rx="26" fill="url(#card)" stroke="#67e8f9" stroke-opacity="0.22"/>
    <rect x="602" y="144" width="220" height="164" rx="26" fill="url(#card)" stroke="#4ade80" stroke-opacity="0.22"/>
    <rect x="870" y="144" width="220" height="164" rx="26" fill="url(#card)" stroke="#facc15" stroke-opacity="0.22"/>
    <rect x="1138" y="144" width="236" height="164" rx="26" fill="url(#card)" stroke="#c084fc" stroke-opacity="0.22"/>
  </g>

  <g font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="94" y="188" fill="#bfdbfe" font-size="15" font-weight="700">STEP 1</text>
    <text x="94" y="224" fill="#f8fafc" font-size="28" font-weight="800">Audit</text>
    <text x="94" y="256" fill="#cbd5e1" font-size="16" font-weight="500">Read-only scan.</text>
    <text x="94" y="280" fill="#cbd5e1" font-size="16" font-weight="500">Measure hotspots first.</text>

    <text x="362" y="188" fill="#a5f3fc" font-size="15" font-weight="700">STEP 2</text>
    <text x="362" y="224" fill="#f8fafc" font-size="28" font-weight="800">List</text>
    <text x="362" y="256" fill="#cbd5e1" font-size="16" font-weight="500">Review target IDs.</text>
    <text x="362" y="280" fill="#cbd5e1" font-size="16" font-weight="500">See blocked and missing items.</text>

    <text x="630" y="188" fill="#bbf7d0" font-size="15" font-weight="700">STEP 3</text>
    <text x="630" y="224" fill="#f8fafc" font-size="28" font-weight="800">Approve</text>
    <text x="630" y="256" fill="#cbd5e1" font-size="16" font-weight="500">Build the approved scope.</text>
    <text x="630" y="280" fill="#cbd5e1" font-size="16" font-weight="500">Confirm risky targets exactly.</text>

    <text x="898" y="188" fill="#fde68a" font-size="15" font-weight="700">STEP 4</text>
    <text x="898" y="224" fill="#f8fafc" font-size="28" font-weight="800">Clean</text>
    <text x="898" y="256" fill="#cbd5e1" font-size="16" font-weight="500">Apply only after approval.</text>
    <text x="898" y="280" fill="#cbd5e1" font-size="16" font-weight="500">`--yes` only unlocks low risk.</text>

    <text x="1166" y="188" fill="#e9d5ff" font-size="15" font-weight="700">STEP 5</text>
    <text x="1166" y="224" fill="#f8fafc" font-size="28" font-weight="800">Verify</text>
    <text x="1166" y="256" fill="#cbd5e1" font-size="16" font-weight="500">Re-audit and compare.</text>
    <text x="1166" y="280" fill="#cbd5e1" font-size="16" font-weight="500">Keep the delta visible.</text>
  </g>

  <g stroke="url(#accent)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M286 226H334"/>
    <path d="M554 226H602"/>
    <path d="M822 226H870"/>
    <path d="M1090 226H1138"/>
  </g>
  <g fill="#dbeafe">
    <path d="M324 218L338 226L324 234Z"/>
    <path d="M592 218L606 226L592 234Z"/>
    <path d="M860 218L874 226L860 234Z"/>
    <path d="M1128 218L1142 226L1128 234Z"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="340" width="1296" height="78" rx="22" fill="#08111f" fill-opacity="0.9" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>
  <text x="104" y="372" fill="#f8fafc" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800">Risk gates</text>
  <text x="104" y="397" fill="#cbd5e1" font-family="Inter, Avenir Next, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500">Low risk can ride `--yes`. High risk needs exact target confirmation. Hidden-home and other sensitive scopes need the approved list first.</text>
</svg>
